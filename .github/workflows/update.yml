name: OTA Update

on:
  push:
    branches: [main]

jobs:
  update:
    name: Push OTA to devices
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        run: |
          MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          eas update --branch preview --message "$MSG" --non-interactive
